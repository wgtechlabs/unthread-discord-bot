---
name: Container Build

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
    branches: [dev]
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    # For workflow_run events, only proceed when the Test workflow succeeded
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Dockerfile not found. Skipping container build." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build and push container
        # Skip build/push for forked PRs — secrets are not available in that context
        if: |
          steps.dockerfile.outputs.exists == 'true' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: wgtechlabs/container-build-flow-action@v1
        with:
          registry: both
          dockerhub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          ghcr-token: ${{ github.token }}
