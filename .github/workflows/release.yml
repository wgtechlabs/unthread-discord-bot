---
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify GH_PAT is set
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::GH_PAT secret is required. Without it the release event will not trigger downstream container builds."
            exit 1
          fi

      - name: Create release
        id: release
        uses: wgtechlabs/release-build-flow-action@v1
        with:
          # GH_PAT is required so that the published release event triggers downstream workflows.
          github-token: ${{ secrets.GH_PAT }}
          commit-convention: clean-commit

      - name: Release summary
        if: steps.release.outputs.version-bump-type != 'none'
        run: |
          echo "Version: ${{ steps.release.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${{ steps.release.outputs.version-tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.release.outputs.release-url }}" >> "$GITHUB_STEP_SUMMARY"
